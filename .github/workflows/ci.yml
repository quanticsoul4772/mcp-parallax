name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-features -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # z3's C++ build + the OTel/aws-lc dep tree + test binaries sit near the
      # runner's ~14 GB free; the libz3.a link intermittently fails with ENOSPC.
      # Reclaim the unused preinstalled toolchains (~20 GB) first.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # --tests: linking every example exhausts the runner (each statically
      # links z3 + aws-lc + the OTel tree; rust-lld dies with SIGBUS once
      # 007 added two more). Examples are compile-verified without linking
      # in the next step and exercised manually/live per the quickstarts.
      - run: cargo test --all-features --tests
      - run: cargo check --all-features --examples

  # Line-coverage gate. Runs the `cov` alias from .cargo/config.toml so the
  # floor is defined in exactly one place (local `cargo cov` and CI agree).
  # The alias carries --fail-under-lines, so a drop below the floor fails here.
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Coverage instrumentation ~doubles object-file size; on top of z3's
      # large C++ build the runner's default ~14 GB free isn't enough (libz3.a
      # link fails with ENOSPC). Reclaim the preinstalled toolchains we don't
      # use (~20 GB) before building.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      - run: cargo cov --summary-only

  # Verify the crate still builds on its declared MSRV (Cargo.toml
  # `rust-version`). The other jobs run @stable; without this the real
  # floor can drift and only surface later. Bump in lockstep with
  # Cargo.toml `rust-version`.
  msrv:
    name: MSRV (1.94)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.94.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-features
