version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      rust-dependencies:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    ignore:
      # The tag on this action selects the Rust toolchain itself, not an
      # action version. The MSRV job's pin must move in lockstep with
      # Cargo.toml `rust-version` — by hand, never by Dependabot.
      - dependency-name: dtolnay/rust-toolchain
